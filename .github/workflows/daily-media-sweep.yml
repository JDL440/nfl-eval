name: Daily Media Sweep & Job Enqueue

# Timezone: EST (UTC-5) or EDT (UTC-4)
# 0 11 * * * = 11:00 UTC = 6:00 AM EST (winter) / 6:00 AM EDT (summer with +1 hour)
# Note: GitHub Actions cron uses UTC. Adjust the hour value if daylight savings affects your timezone offset.
on:
  schedule:
    - cron: '0 11 * * *'
  workflow_dispatch:

jobs:
  media-sweep:
    runs-on: ubuntu-latest
    name: Media Sweep & Job Enqueue

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Set up Redis (in-process for actions)
        run: |
          docker run -d -p 6379:6379 redis:latest

      - name: Wait for Redis
        run: sleep 2

      - name: Run media sweep job enqueuer
        run: npm run sweep
        env:
          REDIS_HOST: localhost
          REDIS_PORT: 6379

      - name: Commit updated queue state
        run: |
          git config --local user.email "backend@nfl-eval.local"
          git config --local user.name "BullMQ Backend"
          
          if [[ -z $(git status -s) ]]; then
            echo "No changes to commit"
            exit 0
          fi
          
          git add .queue/
          git commit -m "chore: update queue state from daily media sweep [skip ci]" || true
          
          # Retry on conflict (another sweep running)
          max_attempts=3
          attempt=1
          while [ $attempt -le $max_attempts ]; do
            if git push origin HEAD:refs/heads/${{ github.ref_name }}; then
              echo "✅ Queue state committed"
              exit 0
            else
              echo "⚠️  Push failed (attempt $attempt/$max_attempts), retrying..."
              git pull --rebase origin ${{ github.ref_name }}
              attempt=$((attempt + 1))
              sleep 2
            fi
          done
          
          echo "❌ Failed to push queue state after $max_attempts attempts"
          exit 1

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v3
        with:
          name: media-sweep-logs
          path: .queue/
          retention-days: 7
